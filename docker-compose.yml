services:
  postgres:
    image: postgres:15
    container_name: music_postgres
    restart: always
    environment:
      POSTGRES_DB: music_db
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    ports:
      - "5487:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d music_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: music_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/music_db
      SPRING_DATASOURCE_USERNAME: music
      SPRING_DATASOURCE_PASSWORD: music
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads: